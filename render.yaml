services:
  - type: web
    name: shein-voucher-hub-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        value: 8004114088
      - key: DATABASE_URL
        fromDatabase:
          name: sheinvoucherhub
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: sheinvoucherhub
    databaseName: sheinvoucherhub
    user: sheinvoucherhub_user
